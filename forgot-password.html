<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recover prototype access | Autocode</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;800;900&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/theme.css?v=20260719-19">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body data-auth-page="forgot-password">
  <a class="skip-link" href="#main">Skip to recovery form</a>
  <div class="prototype-banner px-4 py-2 text-center text-xs font-bold">Recovery is simulated in this local prototype</div>
  <header class="app-shell py-5"><a href="./index.html"><img class="brand-logo" src="./design_template/Autoserve%20logo.svg" alt="Autoserve"></a></header>
  <main id="main" class="app-shell py-10 lg:py-20">
    <section class="app-card mx-auto max-w-xl p-6 sm:p-9">
      <p class="text-sm font-extrabold uppercase tracking-[0.14em] text-blue-700">Access recovery</p>
      <h1 class="mt-3 text-3xl font-black text-slate-950">Forgot your password?</h1>
      <p class="mt-3 leading-7 text-slate-600">Enter the email, mobile number, or Staff ID associated with the prototype account.</p>
      <div data-auth-feedback hidden class="mt-5" role="status" aria-live="polite"></div>
      <form data-auth-form class="mt-7 space-y-5" novalidate>
        <label class="block"><span class="text-sm font-bold text-slate-800">Account identifier</span><input name="identifier" required class="mt-2 w-full rounded-xl border border-slate-300 px-4 py-3.5" placeholder="Email, mobile, or Staff ID"></label>
        <button class="w-full rounded-xl bg-blue-700 px-6 py-3.5 font-extrabold text-white hover:bg-blue-800" type="submit">Simulate recovery</button>
      </form>
      <a href="./login.html" class="mt-6 inline-flex text-sm font-bold text-blue-800 hover:underline">Return to sign in</a>
    </section>
  </main>
  <script src="./assets/js/state.js"></script>
  <script src="./assets/js/app.js?v=20260719-19"></script>
  <script src="./assets/js/auth.js"></script>
</body>
</html>
