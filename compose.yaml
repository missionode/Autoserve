name: autoserve-development
services:
  migrate:
    build: &application-build
      context: .
      dockerfile: Dockerfile.local
      args: { AUTOSERVE_SERVICE: api }
    command:
      ['npx', 'prisma', 'migrate', 'deploy', '--schema', 'packages/database/prisma/schema.prisma']
    environment: &server-environment
      NODE_ENV: development
      APP_ENV: development
      APP_VERSION: local-docker
      API_PORT: 3001
      WORKER_PORT: 3002
      DATABASE_URL: postgresql://autoserve:autoserve_local@postgres:5432/autoserve
      REDIS_URL: redis://redis:6379
      OBJECT_STORAGE_ENDPOINT: http://object-storage:9000
      OBJECT_STORAGE_REGION: ap-south-1
      OBJECT_STORAGE_BUCKET: autoserve-development
      OBJECT_STORAGE_ACCESS_KEY: autoserve_local
      OBJECT_STORAGE_SECRET_KEY: replace-for-local-only
      LOG_LEVEL: info
    depends_on:
      postgres: { condition: service_healthy }
    restart: 'no'
  seed:
    build: *application-build
    command: ['npm', 'run', 'seed']
    environment: *server-environment
    depends_on:
      migrate: { condition: service_completed_successfully }
    restart: 'no'
  api:
    build: *application-build
    environment: *server-environment
    ports: ['3001:3001']
    depends_on:
      seed: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
      object-storage: { condition: service_started }
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3001/api/v1/health']
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
  worker:
    build:
      <<: *application-build
      args: { AUTOSERVE_SERVICE: worker }
    environment: *server-environment
    ports: ['3002:3002']
    depends_on:
      seed: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3002/health']
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
  web:
    build:
      <<: *application-build
      args: { AUTOSERVE_SERVICE: web }
    environment:
      NODE_ENV: development
      APP_ENV: development
      APP_VERSION: local-docker
      NEXT_PUBLIC_API_ORIGIN: http://localhost:3001
    ports: ['3000:3000']
    depends_on:
      api: { condition: service_healthy }
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000/health']
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
  postgres:
    image: postgres:17.5-alpine
    environment:
      POSTGRES_DB: autoserve
      POSTGRES_USER: autoserve
      POSTGRES_PASSWORD: autoserve_local
    ports: ['5432:5432']
    healthcheck:
      { test: ['CMD-SHELL', 'pg_isready -U autoserve'], interval: 5s, timeout: 3s, retries: 10 }
    volumes: ['postgres-data:/var/lib/postgresql/data']
  redis:
    image: redis:8.0.3-alpine
    command: ['redis-server', '--appendonly', 'yes']
    ports: ['6379:6379']
    healthcheck: { test: ['CMD', 'redis-cli', 'ping'], interval: 5s, timeout: 3s, retries: 10 }
    volumes: ['redis-data:/data']
  object-storage:
    image: minio/minio:RELEASE.2025-07-18T21-56-31Z
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: autoserve_local
      MINIO_ROOT_PASSWORD: replace-for-local-only
    ports: ['9000:9000', '9001:9001']
    volumes: ['object-data:/data']
  provider-stub:
    image: wiremock/wiremock:3.13.1
    ports: ['8089:8080']
    volumes: ['./infrastructure/local/wiremock:/home/wiremock:ro']
volumes:
  postgres-data:
  redis-data:
  object-data:
