<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create customer account | Autocode</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;800;900&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/theme.css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body data-auth-page="signup">
  <a class="skip-link" href="#main">Skip to registration</a>
  <div class="prototype-banner px-4 py-2 text-center text-xs font-bold">Prototype authentication only — use fictional information</div>
  <header class="app-shell flex items-center justify-between py-5">
    <a href="./index.html"><img class="brand-logo" src="./design_template/Autoserve%20logo.svg" alt="Autoserve"></a>
    <a href="./login.html" class="text-sm font-bold text-blue-800 hover:underline">Already registered? Sign in</a>
  </header>
  <main id="main" class="app-shell py-8 lg:py-14">
    <section class="app-card mx-auto max-w-2xl p-6 sm:p-9" aria-labelledby="signup-title">
      <p class="text-sm font-extrabold uppercase tracking-[0.14em] text-blue-700">Customer registration</p>
      <h1 id="signup-title" class="mt-3 text-3xl font-black text-slate-950 sm:text-4xl">Create your account</h1>
      <p class="mt-3 leading-7 text-slate-600">Save order history and unlock rewards when you win Tic-Tac-Toe.</p>
      <div data-auth-feedback hidden class="mt-5" role="status" aria-live="polite"></div>
      <form data-auth-form class="mt-7 grid gap-5 sm:grid-cols-2" novalidate>
        <label class="block sm:col-span-2"><span class="text-sm font-bold text-slate-800">Full name</span><input name="name" autocomplete="name" required class="mt-2 w-full rounded-xl border border-slate-300 px-4 py-3.5" placeholder="Your name"></label>
        <label class="block"><span class="text-sm font-bold text-slate-800">Email</span><input name="email" type="email" autocomplete="email" required class="mt-2 w-full rounded-xl border border-slate-300 px-4 py-3.5" placeholder="you@example.com"></label>
        <label class="block"><span class="text-sm font-bold text-slate-800">Mobile number</span><input name="mobile" inputmode="numeric" autocomplete="tel" required class="mt-2 w-full rounded-xl border border-slate-300 px-4 py-3.5" placeholder="10 digits"></label>
        <label class="block sm:col-span-2"><span class="text-sm font-bold text-slate-800">Password</span><input name="password" type="password" autocomplete="new-password" minlength="8" required class="mt-2 w-full rounded-xl border border-slate-300 px-4 py-3.5" placeholder="At least 8 characters"></label>
        <label class="flex items-start gap-3 text-sm leading-6 text-slate-600 sm:col-span-2"><input name="terms" value="accepted" type="checkbox" required class="mt-1 size-4 rounded border-slate-300"><span>I understand this is a local prototype and agree to its simulated terms.</span></label>
        <button class="rounded-xl bg-blue-700 px-6 py-3.5 font-extrabold text-white hover:bg-blue-800 sm:col-span-2" type="submit">Create account</button>
      </form>
    </section>
  </main>
  <script src="./assets/js/state.js"></script>
  <script src="./assets/js/app.js"></script>
  <script src="./assets/js/auth.js"></script>
</body>
</html>
